<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 660" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr-uart" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#fd7e14"/>
    </marker>
    <marker id="arr-can-h" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ffc107"/>
    </marker>
    <marker id="arr-can-l" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#198754"/>
    </marker>
    <marker id="arr-pwr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#dc3545"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="660" fill="#f8f9fa"/>

  <!-- Title bar -->
  <rect width="1100" height="54" fill="#ffffff"/>
  <rect y="54" width="1100" height="3" fill="#52a441"/>
  <text x="24" y="35" font-size="16" font-weight="700" fill="#52a441">TrailCurrent Solstice</text>
  <text x="248" y="35" font-size="13" fill="#495057">Waveshare ESP32-S3-RS485-CAN — External Connections</text>

  <!-- =============== BOARD (top view) =============== -->
  <rect x="290" y="160" width="520" height="160" fill="#2a5fa5" stroke="#1a3f75" stroke-width="2" rx="6"/>
  <text x="550" y="184" text-anchor="middle" font-size="11" fill="#8ab4f8" font-weight="600">ESP32-S3-RS485-CAN (Top View)</text>

  <!-- PWR terminal — + Red (top) / − Black (bottom) -->
  <rect x="290" y="170" width="50" height="15" fill="#dc3545" stroke="#a52834" stroke-width="1.5" rx="2"/>
  <text x="315" y="181" text-anchor="middle" font-size="7.5" fill="#fff" font-weight="700">+ RED</text>
  <rect x="290" y="187" width="50" height="15" fill="#1a1a1a" stroke="#000" stroke-width="1.5" rx="2"/>
  <text x="315" y="198" text-anchor="middle" font-size="7.5" fill="#fff" font-weight="700">− BLK</text>

  <!-- USB-C -->
  <rect x="273" y="252" width="28" height="44" fill="#6c757d" stroke="#495057" stroke-width="1.5" rx="2"/>
  <text x="287" y="278" text-anchor="middle" font-size="8" fill="#fff" font-weight="600">USB-C</text>

  <!-- IDC 2x10 ribbon header -->
  <rect x="308" y="262" width="44" height="24" fill="#fd7e14" stroke="#c96208" stroke-width="1.5" rx="2"/>
  <text x="330" y="274" text-anchor="middle" font-size="8" fill="#fff" font-weight="700">IDC</text>
  <text x="330" y="284" text-anchor="middle" font-size="7" fill="#ffe5cc">Ribbon</text>

  <!-- ESP32-S3 chip -->
  <rect x="510" y="220" width="80" height="60" fill="#1a3f75" stroke="#0d2b52" stroke-width="1" rx="2"/>
  <text x="550" y="246" text-anchor="middle" font-size="9" fill="#8ab4f8">ESP32-S3</text>
  <text x="550" y="260" text-anchor="middle" font-size="9" fill="#8ab4f8">WROOM</text>

  <!-- RS485 terminal (unused) -->
  <rect x="795" y="180" width="30" height="44" fill="#6c757d" stroke="#495057" stroke-width="1.5" rx="2"/>
  <text x="810" y="200" text-anchor="middle" font-size="8" fill="#fff" font-weight="700">RS485</text>
  <text x="810" y="212" text-anchor="middle" font-size="7" fill="#dee2e6">unused</text>

  <!-- CAN terminal — CANH Yellow / CANL Green -->
  <rect x="795" y="228" width="30" height="22" fill="#ffc107" stroke="#c9a000" stroke-width="1.5" rx="2"/>
  <text x="810" y="243" text-anchor="middle" font-size="7.5" fill="#212529" font-weight="700">CAN-H</text>
  <rect x="795" y="253" width="30" height="22" fill="#198754" stroke="#146c43" stroke-width="1.5" rx="2"/>
  <text x="810" y="268" text-anchor="middle" font-size="7.5" fill="#fff" font-weight="700">CAN-L</text>

  <!-- =============== POWER INPUT TAG =============== -->
  <rect x="52" y="165" width="196" height="46" fill="#dc3545" stroke="#a52834" stroke-width="1" rx="4"/>
  <text x="150" y="184" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">6-36V Power Input</text>
  <text x="150" y="200" text-anchor="middle" font-size="9" fill="#ffcdd2">Red = +  ·  Black = −</text>
  <polyline points="248,178 290,178" fill="none" stroke="#dc3545" stroke-width="2" marker-end="url(#arr-pwr)"/>

  <!-- =============== CAN BUS TAG =============== -->
  <rect x="856" y="228" width="218" height="48" fill="#198754" stroke="#146c43" stroke-width="1" rx="4"/>
  <text x="965" y="246" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">CAN Bus — 500 kbps</text>
  <text x="965" y="261" text-anchor="middle" font-size="9" fill="#d1e7dd">Yellow = CAN-H  ·  Green = CAN-L</text>
  <text x="965" y="272" text-anchor="middle" font-size="8" fill="#a8d5b5">ISO 11898 standard wire colors</text>
  <polyline points="856,239 828,239" fill="none" stroke="#ffc107" stroke-width="2" marker-end="url(#arr-can-h)"/>
  <polyline points="856,264 828,264" fill="none" stroke="#198754" stroke-width="2" marker-end="url(#arr-can-l)"/>

  <!-- =============== RIBBON CABLE ROUTE =============== -->
  <polyline points="330,286 330,358 148,358 148,378"
    fill="none" stroke="#fd7e14" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arr-uart)"/>
  <text x="340" y="328" font-size="11" fill="#fd7e14" font-weight="600">Ribbon</text>
  <text x="340" y="344" font-size="10" fill="#fd7e14">cable</text>

  <!-- =============== WIRING DETAIL BLOCK =============== -->
  <rect x="60" y="378" width="420" height="260" fill="#ffffff" stroke="#dee2e6" stroke-width="1.5" rx="6"/>

  <!-- Block title -->
  <text x="270" y="400" text-anchor="middle" font-size="13" font-weight="700" fill="#212529">VE.Direct ↔ DTM 4P Connection Detail</text>
  <line x1="70" y1="408" x2="472" y2="408" stroke="#dee2e6" stroke-width="1"/>

  <!-- Column headers -->
  <text x="160" y="422" text-anchor="middle" font-size="11" font-weight="600" fill="#495057">DTM 4P (case exterior)</text>
  <text x="160" y="434" text-anchor="middle" font-size="9" fill="#6c757d">face view, looking from outside</text>
  <text x="370" y="422" text-anchor="middle" font-size="11" font-weight="600" fill="#495057">VE.Direct Connectors</text>
  <text x="370" y="434" text-anchor="middle" font-size="9" fill="#6c757d">face view on each Victron device, pin 1 left</text>

  <!-- Vertical column divider -->
  <line x1="265" y1="412" x2="265" y2="548" stroke="#dee2e6" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ===== LEFT CONNECTOR: DTM 4P (2x2 arrangement) ===== -->
  <!-- Housing outline -->
  <rect x="88" y="444" width="88" height="62" fill="#e9ecef" stroke="#6c757d" stroke-width="1.5" rx="4"/>
  <!-- Pin 1 corner triangle -->
  <polygon points="88,444 104,444 88,460" fill="#6c757d"/>
  <text x="91" y="456" font-size="7.5" fill="#fff" font-weight="700">1</text>

  <!-- Pin 1: MPPT TX (orange) — top-left -->
  <circle cx="114" cy="464" r="11" fill="#fd7e14" stroke="#c96208" stroke-width="1.5"/>
  <text x="114" y="468" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">1</text>

  <!-- Pin 2: MPPT RX (amber) — top-right -->
  <circle cx="154" cy="464" r="11" fill="#ffc107" stroke="#c9a000" stroke-width="1.5"/>
  <text x="154" y="468" text-anchor="middle" font-size="9" fill="#212529" font-weight="700">2</text>

  <!-- Pin 3: Shunt RX (blue) — bottom-left -->
  <circle cx="114" cy="493" r="11" fill="#4a90d9" stroke="#3570ab" stroke-width="1.5"/>
  <text x="114" y="497" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">3</text>

  <!-- Pin 4: NC (gray) — bottom-right -->
  <circle cx="154" cy="493" r="11" fill="#dee2e6" stroke="#adb5bd" stroke-width="1.5"/>
  <text x="154" y="497" text-anchor="middle" font-size="9" fill="#adb5bd" font-weight="700">4</text>

  <!-- ===== RIGHT SIDE: Victron MPPT VE.Direct ===== -->
  <text x="370" y="452" text-anchor="middle" font-size="10" font-weight="600" fill="#212529">Victron MPPT</text>

  <!-- MPPT housing rect -->
  <rect x="289" y="456" width="162" height="26" fill="#e9ecef" stroke="#6c757d" stroke-width="1.5" rx="3"/>
  <!-- Pin 1 corner triangle -->
  <polygon points="289,456 303,456 289,470" fill="#6c757d"/>
  <text x="291" y="466" font-size="7" fill="#fff" font-weight="700">1</text>

  <!-- MPPT Pins (r=9): 1=GND(black), 2=RX(orange), 3=TX(amber), 4=PWR(faded) -->
  <circle cx="309" cy="469" r="9" fill="#1a1a1a" stroke="#000" stroke-width="1.5"/>
  <circle cx="334" cy="469" r="9" fill="#fd7e14" stroke="#c96208" stroke-width="1.5"/>
  <circle cx="359" cy="469" r="9" fill="#ffc107" stroke="#c9a000" stroke-width="1.5"/>
  <circle cx="384" cy="469" r="9" fill="#f8d7da" stroke="#f5c6cb" stroke-width="1.5"/>

  <!-- MPPT Pin numbers inside -->
  <text x="309" y="473" text-anchor="middle" font-size="8" fill="#fff" font-weight="700">1</text>
  <text x="334" y="473" text-anchor="middle" font-size="8" fill="#fff" font-weight="700">2</text>
  <text x="359" y="473" text-anchor="middle" font-size="8" fill="#212529" font-weight="700">3</text>
  <text x="384" y="473" text-anchor="middle" font-size="8" fill="#adb5bd" font-weight="700">4</text>

  <!-- MPPT Signal labels below -->
  <text x="309" y="492" text-anchor="middle" font-size="8" fill="#212529" font-weight="700">GND</text>
  <text x="334" y="492" text-anchor="middle" font-size="8" fill="#212529" font-weight="700">RX</text>
  <text x="359" y="492" text-anchor="middle" font-size="8" fill="#212529" font-weight="700">TX</text>
  <text x="384" y="492" text-anchor="middle" font-size="8" fill="#adb5bd">PWR</text>

  <!-- ===== RIGHT SIDE: Victron SmartShunt VE.Direct ===== -->
  <text x="370" y="504" text-anchor="middle" font-size="10" font-weight="600" fill="#212529">Victron SmartShunt</text>

  <!-- SmartShunt housing rect -->
  <rect x="289" y="507" width="162" height="26" fill="#e9ecef" stroke="#6c757d" stroke-width="1.5" rx="3"/>
  <!-- Pin 1 corner triangle -->
  <polygon points="289,507 303,507 289,521" fill="#6c757d"/>
  <text x="291" y="517" font-size="7" fill="#fff" font-weight="700">1</text>

  <!-- SmartShunt Pins: 1=GND(black), 2=NC(faded), 3=TX(blue), 4=NC(faded) -->
  <circle cx="309" cy="520" r="9" fill="#1a1a1a" stroke="#000" stroke-width="1.5"/>
  <circle cx="334" cy="520" r="9" fill="#dee2e6" stroke="#adb5bd" stroke-width="1.5"/>
  <circle cx="359" cy="520" r="9" fill="#4a90d9" stroke="#3570ab" stroke-width="1.5"/>
  <circle cx="384" cy="520" r="9" fill="#dee2e6" stroke="#adb5bd" stroke-width="1.5"/>

  <!-- SmartShunt Pin numbers -->
  <text x="309" y="524" text-anchor="middle" font-size="8" fill="#fff" font-weight="700">1</text>
  <text x="334" y="524" text-anchor="middle" font-size="8" fill="#adb5bd" font-weight="700">2</text>
  <text x="359" y="524" text-anchor="middle" font-size="8" fill="#fff" font-weight="700">3</text>
  <text x="384" y="524" text-anchor="middle" font-size="8" fill="#adb5bd" font-weight="700">4</text>

  <!-- SmartShunt Signal labels below -->
  <text x="309" y="543" text-anchor="middle" font-size="8" fill="#212529" font-weight="700">GND</text>
  <text x="334" y="543" text-anchor="middle" font-size="8" fill="#adb5bd">--</text>
  <text x="359" y="543" text-anchor="middle" font-size="8" fill="#212529" font-weight="700">TX</text>
  <text x="384" y="543" text-anchor="middle" font-size="8" fill="#adb5bd">--</text>

  <!-- ===== CONNECTION TABLE (below connectors) ===== -->
  <line x1="70" y1="550" x2="472" y2="550" stroke="#dee2e6" stroke-width="1"/>
  <line x1="265" y1="550" x2="265" y2="626" stroke="#dee2e6" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Row 1: orange — DTM Pin 1 (IO3) → MPPT Pin 2 (RX) -->
  <rect x="72" y="560" width="12" height="12" fill="#fd7e14" rx="2"/>
  <text x="90" y="571" font-size="10" fill="#212529" font-weight="600">Pin 1 — Wire 9 — IO3  →</text>
  <line x1="210" y1="566" x2="270" y2="566" stroke="#fd7e14" stroke-width="3"/>
  <circle cx="210" cy="566" r="3" fill="#fd7e14"/>
  <circle cx="270" cy="566" r="3" fill="#fd7e14"/>
  <rect x="272" y="560" width="12" height="12" fill="#fd7e14" rx="2"/>
  <text x="290" y="571" font-size="10" fill="#212529" font-weight="600">MPPT Pin 2 — RX  (load control TX)</text>

  <!-- Row 2: amber — DTM Pin 2 (IO14) ← MPPT Pin 3 (TX) -->
  <rect x="72" y="578" width="12" height="12" fill="#ffc107" rx="2"/>
  <text x="90" y="589" font-size="10" fill="#212529" font-weight="600">Pin 2 — Wire 10 — IO14 ←</text>
  <line x1="210" y1="584" x2="270" y2="584" stroke="#ffc107" stroke-width="3"/>
  <circle cx="210" cy="584" r="3" fill="#ffc107"/>
  <circle cx="270" cy="584" r="3" fill="#ffc107"/>
  <rect x="272" y="578" width="12" height="12" fill="#ffc107" rx="2"/>
  <text x="290" y="589" font-size="10" fill="#212529" font-weight="600">MPPT Pin 3 — TX  (solar data RX)</text>

  <!-- Row 3: blue — DTM Pin 3 (IO4) ← SmartShunt Pin 3 (TX) -->
  <rect x="72" y="596" width="12" height="12" fill="#4a90d9" rx="2"/>
  <text x="90" y="607" font-size="10" fill="#212529" font-weight="600">Pin 3 — Wire 11 — IO4  ←</text>
  <line x1="210" y1="602" x2="270" y2="602" stroke="#4a90d9" stroke-width="3"/>
  <circle cx="210" cy="602" r="3" fill="#4a90d9"/>
  <circle cx="270" cy="602" r="3" fill="#4a90d9"/>
  <rect x="272" y="596" width="12" height="12" fill="#4a90d9" rx="2"/>
  <text x="290" y="607" font-size="10" fill="#212529" font-weight="600">SmartShunt Pin 3 — TX  (RX only)</text>

  <!-- Notes -->
  <text x="270" y="623" text-anchor="middle" font-size="9" fill="#6c757d" font-style="italic">GND shared via CAN bus — no ground wire in ribbon cable  ·  DTM Pin 4 not fitted  ·  MPPT Pin 4 (PWR) and Shunt Pins 2/4 not connected</text>

  <!-- =============== CAN BUS PROTOCOL SUMMARY =============== -->
  <rect x="500" y="370" width="576" height="160" fill="#ffffff" stroke="#dee2e6" stroke-width="1.5" rx="6"/>
  <text x="788" y="394" text-anchor="middle" font-size="13" font-weight="700" fill="#212529">CAN Bus Messages</text>

  <text x="520" y="416" font-size="11" fill="#198754" font-weight="700">TX (@ ~33 ms)</text>
  <text x="520" y="430" font-size="10" fill="#495057">0x23  Battery Basic  [v_whole, v_dec, i_sign, i_whole, i_dec, soc_whole, soc_dec]</text>
  <text x="520" y="442" font-size="10" fill="#495057">0x24  Battery Power  [watt_sign, watt_msb, watt_lsb, ttg_msb, ttg_lsb]</text>
  <text x="520" y="454" font-size="10" fill="#495057">0x2C  Solar Basics   [vpv_whole, vpv_dec, ppv_msb, ppv_lsb, vbat_whole, vbat_dec, cs]</text>
  <text x="520" y="466" font-size="10" fill="#495057">0x2D  Solar Current  [i_sign, i_msb, i_lsb]</text>
  <text x="520" y="478" font-size="10" fill="#6c757d">0x2B  Shunt Live     [temp_msb, temp_lsb, midpoint_msb, midpoint_lsb, alarm_msb, alarm_lsb]  ¹</text>
  <text x="520" y="490" font-size="10" fill="#6c757d">0x2F  Shunt History  [deepest_msb, deepest_lsb, cumAh_msb, cumAh_lsb, cycles_msb, cycles_lsb]  ¹</text>
  <text x="520" y="502" font-size="10" fill="#6c757d">0x04  Version Report  [mac3, mac4, mac5, fw_major, fw_minor, fw_patch]  (on boot)</text>
  <text x="520" y="514" font-size="9" fill="#adb5bd" font-style="italic">¹ Transmits zeros — no TX wire to SmartShunt (DTM Pin 4 not fitted)</text>

  <text x="520" y="530" font-size="11" fill="#dc3545" font-weight="700">RX (Control)</text>
  <text x="520" y="544" font-size="10" fill="#495057">0x00  OTA Trigger     0x01  WiFi Config     0x02  Discovery     0x2E  Load Control</text>

  <!-- =============== LEGEND =============== -->
  <rect x="860" y="72" width="216" height="108" fill="#ffffff" stroke="#dee2e6" stroke-width="1.5" rx="6"/>
  <text x="968" y="92" text-anchor="middle" font-size="12" font-weight="700" fill="#212529">Legend</text>

  <rect x="876" y="100" width="14" height="14" fill="#dc3545" rx="3"/>
  <text x="896" y="112" font-size="10" fill="#212529">Power (Red = + / Black = −)</text>

  <rect x="876" y="118" width="14" height="14" fill="#ffc107" rx="3"/>
  <text x="896" y="130" font-size="10" fill="#212529">UART RX — VE.Direct data in</text>

  <rect x="876" y="136" width="14" height="14" fill="#fd7e14" rx="3"/>
  <text x="896" y="148" font-size="10" fill="#212529">UART TX — load control (MPPT only)</text>

  <rect x="876" y="154" width="7" height="14" fill="#ffc107" rx="2"/>
  <rect x="883" y="154" width="7" height="14" fill="#198754" rx="2"/>
  <text x="896" y="166" font-size="10" fill="#212529">CAN-H (Yellow) / CAN-L (Green)</text>

  <text x="876" y="182" font-size="9" fill="#adb5bd">Faded pins = not connected</text>

  <!-- Footer -->
  <rect y="630" width="1100" height="30" fill="#ffffff"/>
  <rect y="630" width="1100" height="1" fill="#dee2e6"/>
  <text x="24" y="649" font-size="9" fill="#52a441" font-weight="600">TrailCurrent</text>
  <text x="110" y="649" font-size="9" fill="#6c757d">Solstice v1.0 — external connections</text>
</svg>
